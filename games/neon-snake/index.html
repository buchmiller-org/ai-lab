<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Neon Snake — classic snake reimagined with neon visuals and glowing effects. Play free in your browser.">
  <title>Neon Snake — AI Games Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="../../styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
  <style>
    /* ── Game Page Layout ── */
    .game-page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .game-page__nav {
      width: 100%;
      max-width: 700px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .back-link {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #06d6a0;
      text-decoration: none;
      padding: 8px 16px;
      border: 1px solid rgba(6, 214, 160, 0.25);
      border-radius: 8px;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .back-link:hover {
      background: rgba(6, 214, 160, 0.1);
      border-color: #06d6a0;
      box-shadow: 0 0 18px rgba(6, 214, 160, 0.15);
    }

    /* ── HUD ── */
    .hud {
      width: 100%;
      max-width: 700px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .hud__score, .hud__high {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .hud__score {
      font-size: 1.3rem;
      color: #06d6a0;
      text-shadow: 0 0 20px rgba(6, 214, 160, 0.5);
    }
    .hud__high {
      font-size: 0.85rem;
      color: #a855f7;
      text-shadow: 0 0 14px rgba(168, 85, 247, 0.4);
    }

    /* ── Canvas Container ── */
    .canvas-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 0 30px rgba(6, 214, 160, 0.08),
        0 0 80px rgba(168, 85, 247, 0.06),
        inset 0 0 60px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .canvas-wrap canvas {
      display: block;
    }

    /* ── Overlays ── */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      z-index: 5;
      transition: opacity 0.3s ease;
    }
    .overlay--hidden { opacity: 0; pointer-events: none; }
    .overlay--visible { opacity: 1; pointer-events: auto; }

    .overlay__bg {
      position: absolute;
      inset: 0;
      background: rgba(8, 12, 24, 0.88);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .overlay__content {
      position: relative;
      z-index: 1;
    }

    .overlay__title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #06d6a0, #a855f7, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      background-size: 200% 200%;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .overlay__subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: #c1cbd8;
      margin-bottom: 8px;
      font-weight: 300;
    }

    .overlay__final-score {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.8rem;
      font-weight: 900;
      color: #06d6a0;
      text-shadow: 0 0 40px rgba(6, 214, 160, 0.6);
      margin: 16px 0 4px;
    }
    .overlay__final-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      color: #8892a4;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .overlay__high-score {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      color: #a855f7;
      text-shadow: 0 0 14px rgba(168, 85, 247, 0.35);
      margin-bottom: 24px;
    }
    .overlay__new-best {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      color: #facc15;
      text-shadow: 0 0 14px rgba(250, 204, 21, 0.5);
      letter-spacing: 0.15em;
      margin-bottom: 20px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .overlay__prompt {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      color: #c1cbd8;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: pulse 2s ease-in-out infinite;
    }

    .overlay__snake-art {
      display: flex;
      gap: 6px;
      margin: 20px auto 28px;
      justify-content: center;
    }
    .overlay__snake-art span {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      animation: snakeWave 1.5s ease-in-out infinite;
    }
    .overlay__snake-art span:nth-child(1) { background: #06d6a0; animation-delay: 0s; }
    .overlay__snake-art span:nth-child(2) { background: #22c55e; animation-delay: 0.1s; }
    .overlay__snake-art span:nth-child(3) { background: #38bdf8; animation-delay: 0.2s; }
    .overlay__snake-art span:nth-child(4) { background: #a855f7; animation-delay: 0.3s; }
    .overlay__snake-art span:nth-child(5) { background: #f472b6; animation-delay: 0.4s; }
    @keyframes snakeWave {
      0%, 100% { transform: translateY(0); opacity: 0.7; }
      50% { transform: translateY(-8px); opacity: 1; }
    }

    /* ── Mobile controls ── */
    .mobile-controls {
      display: none;
      margin-top: 16px;
      gap: 4px;
    }
    .mobile-controls__row {
      display: flex;
      justify-content: center;
      gap: 4px;
    }
    .mobile-btn {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      border: 1px solid rgba(6, 214, 160, 0.2);
      background: rgba(6, 214, 160, 0.06);
      color: #06d6a0;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .mobile-btn:active {
      background: rgba(6, 214, 160, 0.18);
      border-color: #06d6a0;
    }
    .mobile-btn--spacer {
      visibility: hidden;
    }

    @media (pointer: coarse) {
      .mobile-controls { display: flex; flex-direction: column; align-items: center; }
    }
    @media (max-width: 500px) {
      .mobile-controls { display: flex; flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <!-- Shared animated background -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="orb orb--1" aria-hidden="true"></div>
  <div class="orb orb--2" aria-hidden="true"></div>

  <div class="game-page">

    <nav class="game-page__nav">
      <a href="../../" class="back-link" id="back-link">← Back to Arcade</a>
    </nav>

    <!-- HUD -->
    <div class="hud">
      <span class="hud__score" id="hud-score">Score: 0</span>
      <span class="hud__high" id="hud-high">Best: 0</span>
    </div>

    <!-- Canvas + Overlays -->
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="game-canvas"></canvas>

      <!-- Start Overlay -->
      <div class="overlay overlay--visible" id="overlay-start">
        <div class="overlay__bg"></div>
        <div class="overlay__content">
          <h1 class="overlay__title">Neon Snake</h1>
          <div class="overlay__snake-art">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <p class="overlay__prompt">Press any key or tap to start</p>
        </div>
      </div>

      <!-- Game Over Overlay -->
      <div class="overlay overlay--hidden" id="overlay-gameover">
        <div class="overlay__bg"></div>
        <div class="overlay__content">
          <h2 class="overlay__title">Game Over</h2>
          <p class="overlay__final-label">Score</p>
          <div class="overlay__final-score" id="final-score">0</div>
          <div class="overlay__high-score" id="final-high">Best: 0</div>
          <div class="overlay__new-best overlay--hidden" id="new-best" style="display:none">★ New Best! ★</div>
          <p class="overlay__prompt">Press any key or tap to play again</p>
        </div>
      </div>
    </div>

    <!-- Mobile D-pad -->
    <div class="mobile-controls" id="mobile-controls">
      <div class="mobile-controls__row">
        <div class="mobile-btn mobile-btn--spacer"></div>
        <button class="mobile-btn" data-dir="up" aria-label="Up">▲</button>
        <div class="mobile-btn mobile-btn--spacer"></div>
      </div>
      <div class="mobile-controls__row">
        <button class="mobile-btn" data-dir="left" aria-label="Left">◀</button>
        <button class="mobile-btn" data-dir="down" aria-label="Down">▼</button>
        <button class="mobile-btn" data-dir="right" aria-label="Right">▶</button>
      </div>
    </div>

  </div>

<script>
// ─── Configuration ──────────────────────────────────────────
const GRID_COUNT  = 20;        // cells per axis
const BASE_SPEED  = 140;       // ms per tick at start
const MIN_SPEED   = 60;        // fastest tick
const SPEED_STEP  = 3;         // ms faster per food eaten

// Colors
const C_BG        = '#080c18';
const C_GRID      = 'rgba(56, 189, 248, 0.04)';
const C_HEAD      = '#06d6a0';
const C_TAIL      = '#22c55e';
const C_FOOD      = '#f472b6';
const C_FOOD_ALT  = '#fb923c';
const C_PARTICLE  = ['#06d6a0', '#22c55e', '#38bdf8', '#a855f7', '#f472b6', '#facc15'];

// ─── DOM refs ──────────────────────────────────────────────
const canvas      = document.getElementById('game-canvas');
const ctx         = canvas.getContext('2d');
const wrapEl      = document.getElementById('canvas-wrap');
const startOvl    = document.getElementById('overlay-start');
const gameoverOvl = document.getElementById('overlay-gameover');
const hudScore    = document.getElementById('hud-score');
const hudHigh     = document.getElementById('hud-high');
const finalScoreE = document.getElementById('final-score');
const finalHighE  = document.getElementById('final-high');
const newBestE    = document.getElementById('new-best');

// ─── State ─────────────────────────────────────────────────
let cellSize, score, highScore, snake, dir, nextDir, food, speed;
let particles = [];
let gameState = 'start'; // 'start' | 'playing' | 'gameover'
let lastTick = 0;
let animId;

// ─── High score persistence ────────────────────────────────
function loadHigh() {
  try { return parseInt(localStorage.getItem('neonSnakeHigh'), 10) || 0; } catch { return 0; }
}
function saveHigh(v) {
  try { localStorage.setItem('neonSnakeHigh', v); } catch {}
}

// ─── Canvas sizing ─────────────────────────────────────────
function resize() {
  const maxW = Math.min(window.innerWidth - 32, 700);
  const maxH = Math.min(window.innerHeight - 200, 700);
  const side = Math.floor(Math.min(maxW, maxH) / GRID_COUNT) * GRID_COUNT;
  canvas.width  = side;
  canvas.height = side;
  cellSize = side / GRID_COUNT;
}
window.addEventListener('resize', resize);

// ─── Init / Reset ──────────────────────────────────────────
function initGame() {
  const mid = Math.floor(GRID_COUNT / 2);
  snake = [
    { x: mid, y: mid },
    { x: mid - 1, y: mid },
    { x: mid - 2, y: mid },
  ];
  dir     = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score   = 0;
  speed   = BASE_SPEED;
  particles = [];
  placeFood();
  updateHUD();
}

// ─── Food placement ────────────────────────────────────────
function placeFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * GRID_COUNT), y: Math.floor(Math.random() * GRID_COUNT) };
  } while (occupied.has(`${pos.x},${pos.y}`));
  food = pos;
  food.hue = Math.random() > 0.5 ? 0 : 1; // alternate color
}

// ─── Particles ─────────────────────────────────────────────
function spawnParticles(cx, cy) {
  for (let i = 0; i < 14; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = 1.5 + Math.random() * 3;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      color: C_PARTICLE[Math.floor(Math.random() * C_PARTICLE.length)],
      r: 2 + Math.random() * 3,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 12;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── Game logic tick ───────────────────────────────────────
function tick() {
  // Apply queued direction
  dir = { ...nextDir };

  // Move head
  const head = {
    x: (snake[0].x + dir.x + GRID_COUNT) % GRID_COUNT,
    y: (snake[0].y + dir.y + GRID_COUNT) % GRID_COUNT,
  };

  // Self-collision check
  for (const seg of snake) {
    if (seg.x === head.x && seg.y === head.y) {
      endGame();
      return;
    }
  }

  snake.unshift(head);

  // Eat food?
  if (head.x === food.x && head.y === food.y) {
    score++;
    speed = Math.max(MIN_SPEED, speed - SPEED_STEP);
    spawnParticles(
      food.x * cellSize + cellSize / 2,
      food.y * cellSize + cellSize / 2
    );
    placeFood();
    updateHUD();
  } else {
    snake.pop();
  }
}

// ─── HUD ───────────────────────────────────────────────────
function updateHUD() {
  hudScore.textContent = `Score: ${score}`;
  hudHigh.textContent  = `Best: ${highScore}`;
}

// ─── Drawing ───────────────────────────────────────────────
function draw() {
  const w = canvas.width;
  const h = canvas.height;

  // Background
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, w, h);

  // Grid lines
  ctx.strokeStyle = C_GRID;
  ctx.lineWidth = 0.5;
  for (let i = 1; i < GRID_COUNT; i++) {
    const p = i * cellSize;
    ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(w, p); ctx.stroke();
  }

  // Food
  const fx = food.x * cellSize + cellSize / 2;
  const fy = food.y * cellSize + cellSize / 2;
  const foodR = cellSize * 0.35;
  const foodPulse = 1 + Math.sin(performance.now() / 300) * 0.15;
  const foodColor = food.hue === 0 ? C_FOOD : C_FOOD_ALT;

  ctx.save();
  ctx.shadowColor = foodColor;
  ctx.shadowBlur  = 22 * foodPulse;
  ctx.fillStyle   = foodColor;
  ctx.beginPath();
  ctx.arc(fx, fy, foodR * foodPulse, 0, Math.PI * 2);
  ctx.fill();
  // outer glow ring
  ctx.globalAlpha = 0.15;
  ctx.beginPath();
  ctx.arc(fx, fy, foodR * foodPulse * 1.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Snake
  const total = snake.length;
  for (let i = total - 1; i >= 0; i--) {
    const seg = snake[i];
    const t = total > 1 ? i / (total - 1) : 0; // 0 = tail, 1 = head
    const sx = seg.x * cellSize;
    const sy = seg.y * cellSize;
    const pad = cellSize * 0.08;
    const r = cellSize * 0.18;

    // Interpolate color from tail->head
    const color = lerpColor(C_TAIL, C_HEAD, t);

    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur  = i === 0 ? 18 : 10;
    ctx.fillStyle   = color;

    // Rounded rect
    roundRect(ctx, sx + pad, sy + pad, cellSize - pad * 2, cellSize - pad * 2, r);
    ctx.fill();

    // Head eye dots
    if (i === 0) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = C_BG;
      const eyeR = cellSize * 0.08;
      const eyeOff = cellSize * 0.22;
      if (dir.x === 1) { // right
        ctx.beginPath(); ctx.arc(sx + cellSize * 0.65, sy + cellSize * 0.32, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx + cellSize * 0.65, sy + cellSize * 0.68, eyeR, 0, Math.PI * 2); ctx.fill();
      } else if (dir.x === -1) { // left
        ctx.beginPath(); ctx.arc(sx + cellSize * 0.35, sy + cellSize * 0.32, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx + cellSize * 0.35, sy + cellSize * 0.68, eyeR, 0, Math.PI * 2); ctx.fill();
      } else if (dir.y === -1) { // up
        ctx.beginPath(); ctx.arc(sx + cellSize * 0.32, sy + cellSize * 0.35, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx + cellSize * 0.68, sy + cellSize * 0.35, eyeR, 0, Math.PI * 2); ctx.fill();
      } else { // down
        ctx.beginPath(); ctx.arc(sx + cellSize * 0.32, sy + cellSize * 0.65, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx + cellSize * 0.68, sy + cellSize * 0.65, eyeR, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.restore();
  }

  // Particles
  drawParticles();
}

// ─── Utilities ─────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function lerpColor(a, b, t) {
  const ar = parseInt(a.slice(1, 3), 16), ag = parseInt(a.slice(3, 5), 16), ab = parseInt(a.slice(5, 7), 16);
  const br = parseInt(b.slice(1, 3), 16), bg = parseInt(b.slice(3, 5), 16), bb = parseInt(b.slice(5, 7), 16);
  const rr = Math.round(ar + (br - ar) * t);
  const rg = Math.round(ag + (bg - ag) * t);
  const rb = Math.round(ab + (bb - ab) * t);
  return `rgb(${rr},${rg},${rb})`;
}

// ─── Game flow ─────────────────────────────────────────────
function startGame() {
  gameState = 'playing';
  startOvl.classList.remove('overlay--visible');
  startOvl.classList.add('overlay--hidden');
  gameoverOvl.classList.remove('overlay--visible');
  gameoverOvl.classList.add('overlay--hidden');
  initGame();
  lastTick = performance.now();
}

function endGame() {
  gameState = 'gameover';
  const isNewBest = score > highScore;
  if (isNewBest) {
    highScore = score;
    saveHigh(highScore);
  }
  finalScoreE.textContent = score;
  finalHighE.textContent  = `Best: ${highScore}`;
  newBestE.style.display  = isNewBest ? 'block' : 'none';
  gameoverOvl.classList.remove('overlay--hidden');
  gameoverOvl.classList.add('overlay--visible');
  updateHUD();
}

// ─── Main loop ─────────────────────────────────────────────
function loop(ts) {
  animId = requestAnimationFrame(loop);

  if (gameState === 'playing') {
    if (ts - lastTick >= speed) {
      tick();
      lastTick = ts;
    }
    updateParticles();
  }

  draw();
}

// ─── Input handling ────────────────────────────────────────
const DIR_MAP = {
  ArrowUp:    { x:  0, y: -1 },
  ArrowDown:  { x:  0, y:  1 },
  ArrowLeft:  { x: -1, y:  0 },
  ArrowRight: { x:  1, y:  0 },
  w: { x:  0, y: -1 },
  s: { x:  0, y:  1 },
  a: { x: -1, y:  0 },
  d: { x:  1, y:  0 },
  W: { x:  0, y: -1 },
  S: { x:  0, y:  1 },
  A: { x: -1, y:  0 },
  D: { x:  1, y:  0 },
};

document.addEventListener('keydown', (e) => {
  if (gameState === 'start' || gameState === 'gameover') {
    startGame();
    return;
  }
  const d = DIR_MAP[e.key];
  if (d) {
    e.preventDefault();
    // Prevent reversing into yourself
    if (d.x !== -dir.x || d.y !== -dir.y) {
      nextDir = d;
    }
  }
});

// Mobile D-pad buttons
function handleDpad(btn) {
  if (gameState === 'start' || gameState === 'gameover') {
    startGame();
    return;
  }
  const dirName = btn.dataset.dir;
  const map = { up: {x:0,y:-1}, down: {x:0,y:1}, left: {x:-1,y:0}, right: {x:1,y:0} };
  const d = map[dirName];
  if (d && (d.x !== -dir.x || d.y !== -dir.y)) {
    nextDir = d;
  }
}

document.querySelectorAll('.mobile-btn[data-dir]').forEach(btn => {
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleDpad(btn);
  });
  btn.addEventListener('click', (e) => {
    handleDpad(btn);
  });
});

// Tap canvas overlays to start
wrapEl.addEventListener('click', () => {
  if (gameState === 'start' || gameState === 'gameover') {
    startGame();
  }
});

// Swipe support on canvas
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', (e) => {
  if (gameState === 'start' || gameState === 'gameover') {
    startGame();
    e.preventDefault();
    return;
  }
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (gameState !== 'playing') return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const minSwipe = 20;
  if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;
  let d;
  if (Math.abs(dx) > Math.abs(dy)) {
    d = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
  } else {
    d = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
  }
  if (d.x !== -dir.x || d.y !== -dir.y) {
    nextDir = d;
  }
}, { passive: false });

// ─── Boot ──────────────────────────────────────────────────
highScore = loadHigh();
resize();
initGame();
updateHUD();
requestAnimationFrame(loop);
</script>
